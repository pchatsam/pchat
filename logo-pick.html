<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PChat Logo 备选</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#1a1a2e; color:#eee; padding:40px; }
h1 { text-align:center; margin-bottom:40px; font-size:28px; color:#4ecca3; }
.grid { display:flex; flex-wrap:wrap; gap:30px; justify-content:center; max-width:1200px; margin:0 auto; }
.card { background:#16213e; border-radius:16px; padding:30px; text-align:center; width:280px; }
.card:hover { background:#1a2744; box-shadow:0 0 20px rgba(78,204,163,0.15); }
.card svg { display:block; margin:0 auto 16px; }
.card h3 { font-size:14px; color:#888; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
.card .style { font-size:12px; color:#4ecca3; }
</style>
</head>
<body>
<h1>🍃 PChat Logo 备选</h1>

<div class="grid">

<!-- 1: Leaf + Chat Bubble -->
<div class="card">
<h3>风格 1 &mdash; 叶片气泡</h3>
<svg viewBox="0 0 200 200" width="160" height="160">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecca3"/>
      <stop offset="100%" style="stop-color:#3a9e7d"/>
    </linearGradient>
  </defs>
  <path d="M100 30 C120 50 140 85 140 110 C140 130 120 145 100 145 C75 145 65 135 55 160 C52 148 48 140 48 130 C48 100 55 70 75 48 Z" fill="url(#g1)" opacity="0.9"/>
  <path d="M100 30 C110 25 125 22 135 28 C145 34 148 50 140 60" fill="none" stroke="#4ecca3" stroke-width="2" opacity="0.6"/>
  <circle cx="105" cy="95" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="90" cy="105" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="100" cy="115" r="3" fill="#fff" opacity="0.7"/>
</svg>
<div class="style">有机 / 自然 / 轻量</div>
</div>

<!-- 2: P2P Arrows -->
<div class="card">
<h3>风格 2 &mdash; 点对点</h3>
<svg viewBox="0 0 200 200" width="160" height="160">
  <defs>
    <linearGradient id="g2a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecca3"/>
      <stop offset="100%" style="stop-color:#2ecc71"/>
    </linearGradient>
    <linearGradient id="g2b" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="18" fill="url(#g2a)"/>
  <circle cx="150" cy="150" r="18" fill="url(#g2b)"/>
  <path d="M60 55 Q105 95 140 140" fill="none" stroke="#4ecca3" stroke-width="3" stroke-dasharray="6 3"/>
  <path d="M140 140 L148 152 M140 140 L148 128" stroke="#4ecca3" stroke-width="2" fill="none"/>
  <path d="M140 60 Q105 95 60 140" fill="none" stroke="#3498db" stroke-width="3" stroke-dasharray="6 3"/>
  <path d="M60 140 L52 152 M60 140 L52 128" stroke="#3498db" stroke-width="2" fill="none"/>
</svg>
<div class="style">P2P / 联网 / 科技</div>
</div>

<!-- 3: Chat Bubbles 2 -->
<div class="card">
<h3>风格 3 &mdash; 对话气泡</h3>
<svg viewBox="0 0 200 200" width="160" height="160">
  <defs>
    <linearGradient id="g3a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecca3"/>
      <stop offset="100%" style="stop-color:#3a9e7d"/>
    </linearGradient>
    <linearGradient id="g3b" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b8def"/>
      <stop offset="100%" style="stop-color:#4a7bd4"/>
    </linearGradient>
  </defs>
  <rect x="55" y="40" width="100" height="45" rx="22" fill="url(#g3a)" opacity="0.85"/>
  <rect x="45" y="95" width="100" height="45" rx="22" fill="url(#g3b)" opacity="0.8"/>
  <circle cx="65" cy="62" r="5" fill="#fff" opacity="0.5"/>
  <circle cx="82" cy="62" r="5" fill="#fff" opacity="0.5"/>
  <circle cx="55" cy="117" r="5" fill="#fff" opacity="0.5"/>
  <circle cx="72" cy="117" r="5" fill="#fff" opacity="0.5"/>
  <circle cx="89" cy="117" r="5" fill="#fff" opacity="0.5"/>
  <path d="M170 85 Q185 60 160 45" fill="none" stroke="#4ecca3" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
</svg>
<div class="style">聊天 / 对话 / 现代</div>
</div>

<!-- 4: Lock + Chat -->
<div class="card">
<h3>风格 4 &mdash; 安全聊天</h3>
<svg viewBox="0 0 200 200" width="160" height="160">
  <defs>
    <linearGradient id="g4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecca3"/>
      <stop offset="100%" style="stop-color:#2ecc71"/>
    </linearGradient>
  </defs>
  <rect x="55" y="85" width="90" height="55" rx="18" fill="url(#g4)" opacity="0.9"/>
  <path d="M70 85 V70 C70 53 83 40 100 40 C117 40 130 53 130 70 V85" fill="none" stroke="#4ecca3" stroke-width="5" stroke-linecap="round"/>
  <circle cx="100" cy="108" r="7" fill="#16213e"/>
  <rect x="96" y="113" width="8" height="14" rx="3" fill="#16213e"/>
  <circle cx="78" cy="108" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="95" cy="108" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="112" cy="108" r="3" fill="#fff" opacity="0.5"/>
</svg>
<div class="style">加密 / 安全 / 隐私</div>
</div>

<!-- 5: Minimalist Monogram -->
<div class="card">
<h3>风格 5 &mdash; 极简字母</h3>
<svg viewBox="0 0 200 200" width="160" height="160">
  <defs>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecca3"/>
      <stop offset="100%" style="stop-color:#3498db"/>
    </linearGradient>
  </defs>
  <rect x="35" y="35" width="130" height="130" rx="28" fill="none" stroke="url(#g5)" stroke-width="4"/>
  <text x="100" y="120" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="900" font-size="72" fill="url(#g5)">PC</text>
  <circle cx="142" cy="48" r="14" fill="url(#g5)"/>
  <text x="142" y="54" text-anchor="middle" font-family="Arial" font-weight="900" font-size="14" fill="#16213e">✦</text>
</svg>
<div class="style">现代 / 极简 / 品牌</div>
</div>

<!-- 6: Shield + Chat -->

      <stop offset="0%" style="stop-color:#5b8def"/>
      <stop offset="100%" style="stop-color:#4ecca3"/>

  </defs>
  <path d="M100 30 L170 62 L170 115 C170 145 145 162 100 175 C55 162 30 145 30 115 L30 62 Z" fill="none" stroke="url(#g6)" stroke-width="3.5"/>
  <rect x="60" y="75" width="80" height="45" rx="16" fill="url(#g6)" opacity="0.9"/>
  <circle cx="78" cy="97" r="3" fill="#16213e" opacity="0.6"/>
  <circle cx="92" cy="97" r="3" fill="#16213e" opacity="0.6"/>
  <circle cx="106" cy="97" r="3" fill="#16213e" opacity="0.6"/>
  <path d="M140 80 L160 65" stroke="#4ecca3" stroke-width="1.5" opacity="0.3"/>
  <path d="M150 95 L170 85" stroke="#4ecca3" stroke-width="1.5" opacity="0.2"/>
</svg>

</div>

<!-- 7: Abstract Network Nodes -->
<div class="card">
<h3>风格 7 &mdash; 网络节点</h3>
<svg viewBox="0 0 200 200" width="160" height="160">
  <circle cx="100" cy="100" r="30" fill="#4ecca3" opacity="0.9"/>
  <circle cx="50" cy="50" r="12" fill="#3498db" opacity="0.85"/>
  <circle cx="160" cy="55" r="14" fill="#3498db" opacity="0.85"/>
  <circle cx="40" cy="150" r="11" fill="#3498db" opacity="0.85"/>
  <circle cx="165" cy="145" r="13" fill="#3498db" opacity="0.85"/>
  <line x1="60" y1="58" x2="85" y2="80" stroke="#4ecca3" stroke-width="2" opacity="0.4"/>
  <line x1="148" y1="64" x2="115" y2="82" stroke="#4ecca3" stroke-width="2" opacity="0.4"/>
  <line x1="52" y2="140" x2="80" y2="115" stroke="#4ecca3" stroke-width="2" opacity="0.4"/>
  <line x1="150" y1="135" x2="118" y2="115" stroke="#4ecca3" stroke-width="2" opacity="0.4"/>
  <text x="100" y="106" text-anchor="middle" font-family="Arial" font-weight="900" font-size="24" fill="#16213e">PC</text>
</svg>

<!-- 8: Paper Plane -->
<div class="card">
<h3>风格 8 &mdash; 纸飞机</h3>
<svg viewBox="0 0 200 200" width="160" height="160">
  <defs>
    <linearGradient id="g8" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecca3"/>
      <stop offset="100%" style="stop-color:#3498db"/>
    </linearGradient>
  </defs>
  <path d="M30 120 Q65 100 100 100 Q135 100 170 120 L120 85 Q100 70 100 55 L100 100" fill="url(#g8)" opacity="0.9"/>
  <path d="M130 115 Q120 100 100 100 Q80 100 70 115" fill="#3a9e7d" opacity="0.7"/>
  <path d="M100 55 L100 130" stroke="url(#g8)" stroke-width="1.5" opacity="0.3"/>
  <line x1="40" y1="125" x2="70" y2="125" stroke="#4ecca3" stroke-width="1.5" opacity="0.3"/>
  <line x1="130" y1="125" x2="160" y2="125" stroke="#3498db" stroke-width="1.5" opacity="0.3"/>
</svg>

<!-- 9: Circle P -->
<div class="card">
<h3>风格 9 &mdash; 环形标识</h3>
<svg viewBox="0 0 200 200" width="160" height="160">
  <defs>
    <linearGradient id="g9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecca3"/>
      <stop offset="100%" style="stop-color:#2ecc71"/>

  </defs>
  <circle cx="100" cy="100" r="65" fill="none" stroke="url(#g9)" stroke-width="6"/>
  <path d="M100 100 L100 100" stroke="url(#g9)" stroke-width="6" stroke-linecap="round"/>
  <text x="100" y="118" text-anchor="middle" font-family="'Helvetica Neue',Arial" font-weight="900" font-size="64" fill="url(#g9)">P</text>
  <circle cx="145" cy="55" r="12" fill="url(#g9)" opacity="0.6"/>
  <circle cx="148" cy="52" r="4" fill="#16213e" opacity="0.5"/>
</svg>

</div>

</div>
</body>
</html>
