<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PChat - MindRender</title>
    <link rel="stylesheet" href="./dist/chat.css?v=20260512badge">
    <!-- i18n: detect browser language and show/hide language spans -->
    <script>
    (function(){
        var langs = ['zh','en','ja','de','fr','es','pt','he','ko','it'];
        var lang = (navigator.language || navigator.userLanguage || 'zh').substring(0,2);
        if (!langs.includes(lang)) lang = 'en';
        document.write('<style>');
        for (var i = 0; i < langs.length; i++) {
            document.write('.' + langs[i] + '{display:none}');
        }
        document.write('.lang-' + lang + ' .' + lang + '{display:inline}');
        document.write('</style>');
        document.documentElement.className = 'lang-' + lang;
        document.documentElement.lang = lang;
    })();
    </script>
    <!-- Local dependencies (no CDN needed) -->
    <script src="./dist/peerjs.min.js"></script>
    <script src="./dist/crypto-js.js"></script>
    <script src="./dist/forge.min.js"></script>
</head>
<body>
    <!-- 注册/登录面板 -->
    <div id="setup-panel" class="panel">
        <div class="setup-box">
            <h2 style="text-align:center;">🍃 P.Chat</h2>
            <p id="invite-from" style="display:none;color:#888;font-size:12px;margin-bottom:8px;text-align:center;"></p>
            <div id="invite-info" style="display:none;text-align:center;">
                <input type="text" id="nickname-input" placeholder="" maxlength="20" style="margin:0 auto;">
                <input type="password" id="password-input" placeholder="" style="margin-top: 8px;display:block;margin-left:auto;margin-right:auto;">
                <button id="register-btn" onclick="ChatApp.registerUser()" style="margin-top: 8px;">
                    <span class="zh">注册并登录</span>
                </button>
            </div>
            <div id="login-form" style="display:none;text-align:center;">
                <input type="password" id="login-password-input" placeholder="" style="display:block;margin-left:auto;margin-right:auto;">
                <button id="login-btn" onclick="ChatApp.loginUser()" style="margin-top: 8px;">
                    <span class="zh">登录</span>
                </button>
            </div>

            <!-- Loading 进度条 -->
            <div id="login-loading" style="display:none;text-align:center;margin-top:16px;">
                <div style="width:220px;height:4px;background:#e0e0e0;border-radius:2px;overflow:hidden;margin:0 auto;">
                    <div id="login-loading-bar" style="width:0%;height:100%;background:#4caf50;border-radius:2px;transition:width 0.3s;"></div>
                </div>
                <p id="login-loading-text" style="color:#888;font-size:12px;margin-top:8px;"></p>
            </div>

            <!-- 删除账号按钮 -->
            <button id="delete-account-btn" onclick="ChatApp.deleteAccount()" style="display:none;position:fixed;top:16px;left:16px;padding:6px 12px;font-size:13px;background:transparent;color:#f44336;border:1px solid #f44336;border-radius:8px;cursor:pointer;min-height:44px;z-index:100;">
                <span class="zh">删除账号</span> 
            </button>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="main-panel" class="panel" style="display:none;">
        <!-- 侧边栏 -->
        <div id="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <span class="qr-icon" onclick="ChatApp.showMyQR()">▣</span>
                    <div class="user-text">
                        <span id="my-nickname" onclick="ChatApp.copyIdPrompt()" style="cursor:pointer;"></span>
                        <div class="user-id-row">
                            <span class="my-id" title="" id="my-id-display" onclick="ChatApp.copyIdPrompt()" style="cursor:pointer;"></span>
                            <span title="复制ID" onclick="ChatApp.copyIdPrompt()" style="cursor:pointer;margin-left:6px;">❏</span>
                        </div>
                    </div>
                </div>
                <div class="sidebar-actions">
                    <button title="" onclick="ChatApp.showScanModal()">⛶</button>
                </div>
            </div>

            <!-- Tab 切换 -->
            <div style="display:flex;border-bottom:1px solid #e0e0e0;">
                <div id="tab-contacts" class="tab-btn active" onclick="ChatApp.switchTab('contacts')" style="flex:1;text-align:center;padding:8px;cursor:pointer;font-size:13px;font-weight:500;border-bottom:2px solid #4caf50;">
                    <span class="zh">联系人</span> 
                </div>
                <div id="tab-groups" class="tab-btn" onclick="ChatApp.switchTab('groups')" style="flex:1;text-align:center;padding:8px;cursor:pointer;font-size:13px;font-weight:500;border-bottom:2px solid transparent;">
                    <span class="zh">群组</span> 
                </div>
            </div>

            <!-- 好友请求卡片 (内联) -->
            <div id="friend-request-card" style="display:none;padding:10px 12px;border-bottom:1px solid #eee;background:#f0f8ff;">
                <div style="font-size:13px;color:#333;margin-bottom:6px;">🔔 <span id="friend-request-nick"></span> (<span id="friend-request-id"></span>)
                    <span class="zh">请求添加好友</span> 
                </div>
                <div style="display:flex;gap:6px;">
                    <button onclick="ChatApp._acceptFriendRequest()" style="flex:1;padding:4px 0;background:#4caf50;color:#fff;border:none;border-radius:4px;cursor:pointer;">
                        <span class="zh">接受</span> 
                    </button>
                    <button onclick="ChatApp._rejectFriendRequest()" style="flex:1;padding:4px 0;background:#999;color:#fff;border:none;border-radius:4px;cursor:pointer;">
                        <span class="zh">拒绝</span> 
                    </button>
                </div>
            </div>

            <div id="contact-tab" class="tab-content active">
                <div id="add-friend-box" style="padding:8px 12px;border-bottom:1px solid #222;">
                    <div style="display:flex;gap:4px;">
                        <input id="add-friend-input" type="text" placeholder="" maxlength="20" style="flex:1;">
                        <button onclick="ChatApp.addFriendById()" style="padding:4px 8px;">
                            <span class="zh">添加</span> 
                        </button>
                    </div>
                </div>
                <div id="contact-list"></div>
            </div>

            <div id="group-tab" class="tab-content">
                                <button onclick="ChatApp.showCreateGroupModal()" style="display:block;width:100%;padding:8px;margin:8px;background:#4caf50;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;">
                                    <span class="zh">+ 新建群</span> 
                                </button>
                <div id="room-list"></div>
            </div>
        </div>

        <!-- 拖动分隔条 -->
        <div id="sidebar-resize"></div>

        <!-- 聊天区 -->
        <div id="chat-area">
            <div id="chat-placeholder">
                <div class="icon">💬</div>
                <div>
                    <span class="zh">选择一个联系人开始聊天</span> 
                </div>
            </div>
            <div id="chat-active" style="display:none; flex:1; flex-direction:column;">
                <div id="chat-header">
                    <button id="chat-back-btn" title="" onclick="ChatApp.closeChatView()">←</button>
                    <span id="chat-title"></span>
                    <span id="chat-type"></span>
                    <button id="call-btn" title="" onclick="ChatApp.initiateCall()">📞</button>
                </div>
                <!-- 通话状态栏 -->
                <div id="call-status-bar" style="display:none; align-items:center; justify-content:space-between; padding:8px 16px; background:#e8f5e9; border-bottom:1px solid #c8e6c9;">
                    <span id="call-status-text" style="font-size:13px; color:#2e7d32;">
                        <span class="zh">通话中</span> 
                    </span>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <span id="call-status-timer" style="font-size:14px; font-weight:500; color:#1b5e20;"></span>
                        <button id="call-status-hangup" title="" onclick="ChatApp.hangupCall()" style="background:#ff4b4b; color:#fff; border:none; border-radius:50%; width:36px; height:36px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;">📞</button>
                    </div>
                </div>
                <div id="message-list"></div>
                <div id="input-area">
                    <div class="input-tools">
                        <button id="voice-btn" title="" onclick="ChatApp.startRecording()">🎙️</button>
                        <button title="" onclick="document.getElementById('image-upload').click()">🖼️</button>
                        <button title="" onclick="document.getElementById('file-upload').click()">📎</button>
                    </div>
                    <textarea id="message-input" placeholder="" rows="1"></textarea>
                    <button id="send-btn" onclick="ChatApp.sendMessage()">
                        <span class="zh">发送</span> 
                    </button>
                    <input type="file" id="image-upload" accept="image/*" multiple style="display:none" onchange="ChatApp.sendImage(event)">
                    <input type="file" id="file-upload" style="display:none" onchange="ChatApp.sendFile(event)">
                </div>
            </div>
        </div>
    </div>

    <!-- 语音通话 -->
    <div id="call-modal" class="modal" style="display:none;">
        <div class="call-modal-content">
            <div class="call-avatar">👤</div>
            <div id="call-name" class="call-contact-name"></div>
            <div id="call-status" class="call-status"></div>
            <div id="call-timer" class="call-timer"></div>
            <div class="call-actions" id="call-actions">
                <button id="call-reject-btn" class="call-btn reject" onclick="ChatApp.rejectCall()" title="" >📵</button>
                <button id="call-answer-btn" class="call-btn answer" onclick="ChatApp.answerCall()" title="">📞</button>
            </div>
            <button id="call-hangup-btn" class="call-btn hangup" onclick="ChatApp.hangupCall()" title="" style="display:none;">📞</button>
        </div>
    </div>

    <!-- 创建群组 -->
    <div id="create-room-modal" class="modal">
        <div class="modal-content create-group-modal">
            <h3>
                <span class="zh">创建群组</span> 
            </h3>
            <input type="text" id="room-name-input" placeholder="">
            <div id="room-member-select">
                <p>
                    <span class="zh">选择成员：</span> 
                </p>
                <div id="member-checklist"></div>
            </div>
            <div class="modal-actions">
                <button class="cancel-btn" onclick="ChatApp.closeModals()">
                    <span class="zh">取消</span> 
                </button>
                <button class="accept-btn" onclick="ChatApp.createGroup()">
                    <span class="zh">创建</span> 
                </button>
            </div>
        </div>
    </div>

    <!-- 消息提示弹窗 -->
    <div id="alert-modal" class="modal">
        <div class="modal-content alert-content">
            <p id="alert-text"></p>
            <div class="modal-actions">
                <button class="accept-btn" onclick="ChatApp._closeAlert()">
                    <span class="zh">确定</span> 
                </button>
            </div>
        </div>
    </div>


    <!-- 二维码弹窗 -->
    <div id="qr-modal" class="modal" onclick="ChatApp.closeQRModal()">
        <div class="modal-content qr-content" onclick="event.stopPropagation()">
            <h3 style="text-align:center;margin:0 0 12px 0;">
                <span class="zh">我的 ID 二维码</span>
            </h3>
            <div id="qr-canvas" style="text-align:center;padding:16px;"></div>
            <div class="modal-actions">
                <button class="accept-btn" onclick="ChatApp.closeQRModal()">
                    <span class="zh">关闭</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 扫码弹窗 -->
    <div id="scan-modal" class="modal" onclick="ChatApp.closeScanModal()">
        <div class="modal-content qr-content" onclick="event.stopPropagation()">
            <h3 style="text-align:center;margin:0 0 12px 0;">
                <span class="zh">扫描二维码</span>
            </h3>
            <video id="scan-video" autoplay playsinline style="width:100%;max-width:300px;display:block;margin:0 auto;border-radius:8px;"></video>
            <canvas id="scan-canvas" hidden></canvas>
            <p id="scan-status" style="text-align:center;margin-top:8px;color:#888;font-size:12px;"></p>
            <div class="modal-actions">
                <button class="accept-btn" onclick="ChatApp.closeScanModal()">
                    <span class="zh">关闭</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 图片查看器 -->
    <div id="image-viewer" onclick="ChatApp.closeImageViewer(event)">
        <div id="image-viewer-toolbar">
            <button onclick="ChatApp.zoomOut(event)" title="➖">➖</button>
            <button onclick="ChatApp.zoomIn(event)" title="➕">➕</button>
            <button onclick="ChatApp.rotateImage(event)" title="↺">↻</button>
            <button onclick="ChatApp.downloadImage(event)" title="⬇️">⬇️</button>
            <button onclick="ChatApp.closeImageViewer()" title="✕" style="margin-left:auto;">✕</button>
        </div>
        <div id="image-viewer-container">
            <img id="image-viewer-img" src="" alt="">
            <div id="zoom-percent" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.6);color:#fff;font-size:24px;font-weight:bold;padding:12px 24px;border-radius:8px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:2001;">100%</div>
        </div>
    </div>

    <script src="./dist/qrcode.min.js"></script>
    <script src="./dist/jsqr.min.js"></script>
    <script src="./dist/pchat.js?v=20260513swipe2"></script>
</body>
</html>
