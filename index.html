<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PChat</title>
    <meta name="theme-color" content="#4ecca3">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./logo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <link rel="stylesheet" href="./dist/chat.css?v=20260518AE">
    <!-- i18n: detect browser language and show/hide language spans -->
    <script>
    (function(){
        var langs = ['zh','en','ja','de','fr','es','pt','he','ko','it'];
        var lang = (navigator.language || navigator.userLanguage || 'zh').substring(0,2);
        if (!langs.includes(lang)) lang = 'en';
        document.write('<style>');
        for (var i = 0; i < langs.length; i++) {
            document.write('.' + langs[i] + '{display:none}');
        }
        document.write('.lang-' + lang + ' .' + lang + '{display:inline}');
        document.write('</style>');
        document.documentElement.className = 'lang-' + lang;
        document.documentElement.lang = lang;
    })();
    </script>
    <!-- Local dependencies (no CDN needed) -->
    <script src="./dist/peerjs.min.js"></script>
    <script src="./dist/crypto-js.js"></script>
    <script src="./dist/forge.min.js"></script>
</head>
<body>
    <!-- 注册/登录面板 -->
    <div id="setup-panel" class="panel">
        <div class="setup-box">
            <div style="text-align:center;">
                <img src="./logo.svg" alt="PChat" style="width:148px;height:148px;">
            </div>
            <h2 style="text-align:center;font-size:24px;margin:0;">P.Chat</h2>
            <p id="invite-from" style="display:none;color:#888;font-size:12px;margin-bottom:8px;text-align:center;"></p>

            <!-- 注册面板 -->
            <div id="invite-info" style="display:none;text-align:center;">
                <input type="text" id="nickname-input" placeholder="" maxlength="20" style="margin:0 auto;">
                <input type="password" id="password-input" placeholder="" style="margin-top: 8px;display:block;margin-left:auto;margin-right:auto;">
                <button id="register-btn" onclick="ChatApp.registerUser()" style="margin-top: 8px;">
                    <span class="zh">注册并登录</span>
                </button>
            </div>

            <!-- 账号选择面板 -->
            <div id="account-select-panel" style="display:none;">
                <div id="account-list" class="account-list"></div>
            </div>

            <!-- 密码输入面板（选择账号后） -->
            <div id="login-password-panel" style="display:none;text-align:center;margin-top:12px;">
                <input type="password" id="login-password-input" placeholder="" style="display:block;margin-left:auto;margin-right:auto;">
                <button id="login-btn" onclick="ChatApp.loginUser()" style="margin-top: 8px;">
                    <span class="zh">登录</span>
                </button>
            </div>

            <!-- 左上角：转移账户 -->
            <button id="transfer-out-btn" class="corner-btn corner-btn-left" style="display:none;" onclick="ChatApp.showTransferOut()">
                <span class="zh">转移账户</span>
            </button>
            <!-- 右上角：新建账户 -->
            <button id="new-account-btn" class="corner-btn corner-btn-right" style="display:none;" onclick="ChatApp.showNewAccount()">
                <span class="zh">新建账户</span>
            </button>

            <!-- Loading 进度条 -->
            <div id="login-loading" style="display:none;text-align:center;margin-top:16px;">
                <div style="width:220px;height:4px;background:#e0e0e0;border-radius:2px;overflow:hidden;margin:0 auto;">
                    <div id="login-loading-bar" style="width:0%;height:100%;background:#4caf50;border-radius:2px;transition:width 0.3s;"></div>
                </div>
                <p id="login-loading-text" style="color:#888;font-size:12px;margin-top:8px;"></p>
            </div>
            <div style="text-align:center;padding:16px 0 8px;margin-top:auto;">
                <span id="app-version" style="font-size:11px;color:#666;"></span>
                <button onclick="location.reload()" title="刷新" style="background:none;border:none;cursor:pointer;color:#888;padding:4px;vertical-align:middle;margin-left:4px;"><svg width="24" height="24" viewBox="0 0 32 32"><path d="M24 21a10 10 0 0 1-18.3 5M8 11a10 10 0 0 1 18.3-5" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><polyline points="24,8 28,8 28,4" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><polyline points="8,24 4,24 4,28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            </div>
        </div>
    </div>

    <!-- 转移账户 - 转出方面板 -->
    <div id="transfer-out-panel" class="modal" style="display:none;">
        <div class="modal-content" style="max-width:400px;">
            <span class="close-btn" onclick="ChatApp.hideTransferOut()">&times;</span>
            <h3><span class="zh">转移账户</span></h3>
            <div style="text-align:center;margin:16px 0;">
                <div id="transfer-out-account-select" style="margin-bottom:12px;"></div>
                <input type="password" id="transfer-out-password" placeholder="" style="width:100%;box-sizing:border-box;text-align:center;">
                <button id="transfer-out-verify-btn" onclick="ChatApp.transferOutVerify()" style="margin-top:8px;">
                    <span class="zh">验证</span>
                </button>
            </div>
            <div id="transfer-out-qr" style="display:none;text-align:center;margin:12px 0;">
                <div id="transfer-out-qr-canvas"></div>
                <div id="transfer-out-id-display" style="margin-top:8px;font-size:12px;color:#888;word-break:break-all;"></div>
                <button id="transfer-out-copy-btn" onclick="ChatApp.copyTransferId()" style="margin-top:6px;padding:4px 12px;font-size:12px;display:none;">
                    <span class="zh">复制 ID</span>
                </button>
                <p style="color:#888;font-size:12px;margin-top:8px;"></p>
            </div>
            <div id="transfer-out-progress" style="display:none;margin-top:12px;">
                <div class="transfer-progress-info" style="text-align:center;margin-bottom:8px;"></div>
                <div class="transfer-progress-bar"><div class="transfer-progress-fill"></div></div>
            </div>
        </div>
    </div>

    <!-- 转移账户 - 转入方面板 -->
    <div id="transfer-in-panel" class="modal" style="display:none;">
        <div class="modal-content" style="max-width:400px;">
            <span class="close-btn" onclick="ChatApp.hideTransferIn()">&times;</span>
            <h3><span class="zh">接收转移</span></h3>
            <div style="text-align:center;margin:16px 0;">
                <p id="transfer-in-status" style="color:#888;font-size:14px;"></p>
                <p style="color:#888;font-size:12px;margin-bottom:6px;">
                    <span class="zh">用侧边栏扫码，或输入对方 ID：</span>
                </p>
                <div style="margin-top:8px;">
                    <input type="text" id="transfer-in-id-input" placeholder="" style="width:60%;box-sizing:border-box;text-align:center;">
                    <button id="transfer-in-connect-btn" onclick="ChatApp.transferInConnect()" style="margin-left:4px;">
                        <span class="zh">连接</span>
                    </button>
                </div>
            </div>
            <div id="transfer-in-progress" style="display:none;margin-top:12px;">
                <div class="transfer-progress-info" style="text-align:center;margin-bottom:8px;"></div>
                <div class="transfer-progress-bar"><div class="transfer-progress-fill"></div></div>
            </div>
        </div>
    </div>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="main-panel" class="panel" style="display:none;">
        <!-- 侧边栏 -->
        <div id="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <span class="qr-icon" onclick="ChatApp.showMyQR()"><svg width="24" height="24" viewBox="0 0 32 32"><rect x="6" y="6" width="20" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><rect x="10" y="10" width="6" height="6" fill="currentColor" opacity="0.6"/><rect x="16" y="10" width="6" height="6" fill="currentColor" opacity="0.3"/><rect x="10" y="16" width="6" height="6" fill="currentColor" opacity="0.3"/><rect x="16" y="16" width="6" height="6" fill="currentColor" opacity="0.6"/></svg></span>
                    <div class="user-text">
                        <span id="my-nickname" onclick="ChatApp.copyIdPrompt()" style="cursor:pointer;"></span>
                        <div class="user-id-row">
                            <span class="my-id" title="" id="my-id-display" onclick="ChatApp.copyIdPrompt()" style="cursor:pointer;"></span>
                            <span title="复制ID" onclick="ChatApp.copyIdPrompt()" style="cursor:pointer;margin-left:6px;display:inline-flex;align-items:center;"><svg width="16" height="16" viewBox="0 0 32 32"><rect x="10" y="8" width="18" height="20" rx="2" fill="currentColor" stroke="currentColor" stroke-width="2"/><rect x="6" y="4" width="18" height="20" rx="2" fill="var(--bg)" stroke="currentColor" stroke-width="2"/></svg></span>
                        </div>
                    </div>
                </div>
                <div class="sidebar-actions">
                    <button title="" onclick="ChatApp.showScanModal()"><svg width="28" height="28" viewBox="0 0 32 32"><polyline points="4,4 4,11" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><polyline points="4,4 11,4" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><polyline points="28,4 21,4" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><polyline points="28,4 28,11" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><polyline points="4,28 4,21" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><polyline points="4,28 11,28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><polyline points="28,28 21,28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><polyline points="28,28 28,21" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg></button>
                </div>
            </div>

            <!-- Tab 切换 -->
            <div style="display:flex;border-bottom:1px solid #e0e0e0;">
                <div id="tab-contacts" class="tab-btn active" onclick="ChatApp.switchTab('contacts')" style="flex:1;text-align:center;padding:8px;cursor:pointer;font-size:13px;font-weight:500;border-bottom:2px solid #4caf50;">
                    <span class="zh">联系人</span> 
                </div>
                <div id="tab-groups" class="tab-btn" onclick="ChatApp.switchTab('groups')" style="flex:1;text-align:center;padding:8px;cursor:pointer;font-size:13px;font-weight:500;border-bottom:2px solid transparent;">
                    <span class="zh">群组</span> 
                </div>
            </div>

            <!-- 好友请求卡片 (内联) -->
            <div id="friend-request-card" style="display:none;padding:10px 12px;border-bottom:1px solid #eee;background:#f0f8ff;">
                <div style="font-size:13px;color:#333;margin-bottom:6px;"><svg width="14" height="14" viewBox="0 0 32 32" style="vertical-align:middle;margin-right:2px"><path d="M16 4c-4 0-7 3-7 7v5l-3 4h20l-3-4v-5c0-4-3-7-7-7z" fill="none" stroke="#f39c12" stroke-width="2" stroke-linejoin="round"/><line x1="13" y1="26" x2="19" y2="26" stroke="#f39c12" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="26" x2="16" y2="30" stroke="#f39c12" stroke-width="1.5" stroke-linecap="round"/></svg><span id="friend-request-nick"></span> (<span id="friend-request-id"></span>)
                    <span class="zh">请求添加好友</span> 
                </div>
                <div style="display:flex;gap:6px;">
                    <button onclick="ChatApp._acceptFriendRequest()" style="flex:1;padding:4px 0;background:#4caf50;color:#fff;border:none;border-radius:4px;cursor:pointer;">
                        <span class="zh">接受</span> 
                    </button>
                    <button onclick="ChatApp._rejectFriendRequest()" style="flex:1;padding:4px 0;background:#999;color:#fff;border:none;border-radius:4px;cursor:pointer;">
                        <span class="zh">拒绝</span> 
                    </button>
                </div>
            </div>

            <div id="contact-tab" class="tab-content active">
                <div id="add-friend-box" style="padding:8px 12px;border-bottom:1px solid #222;">
                    <div style="display:flex;gap:4px;">
                        <input id="add-friend-input" type="text" placeholder="" maxlength="30" style="flex:1;">
                        <button onclick="ChatApp.addFriendById()" style="padding:4px 8px;">
                            <span class="zh">添加</span> 
                        </button>
                    </div>
                </div>
                <div id="contact-list"></div>
            </div>

            <div id="group-tab" class="tab-content">
                                <button onclick="ChatApp.showCreateGroupModal()" style="display:block;width:100%;padding:8px;margin:8px;background:#4caf50;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;">
                                    <span class="zh">+ 新建群</span> 
                                </button>
                <div id="room-list"></div>
            </div>
            <div style="padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
                <span id="sidebar-version" style="font-size:11px;color:#666;"></span>
                <button onclick="ChatApp.logout()" title="退出" style="background:none;border:1px solid var(--border);color:var(--text3);padding:3px 8px;border-radius:6px;cursor:pointer;font-size:11px;">退出</button>
            </div>
        </div>

        <!-- 拖动分隔条 -->
        <div id="sidebar-resize"></div>

        <!-- 聊天区 -->
        <div id="chat-area">
            <div id="chat-placeholder">
                <div class="icon"><svg width="64" height="64" viewBox="0 0 32 32"><path d="M4 6h24a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2h-16l-8 6v-6a2 2 0 0 1-2-2v-16a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="15" r="2" fill="currentColor" opacity="0.5"/><circle cx="18" cy="15" r="2" fill="currentColor" opacity="0.5"/><circle cx="24" cy="15" r="2" fill="currentColor" opacity="0.5"/></svg></div>
                <div>
                    <span class="zh">选择一个联系人开始聊天</span> 
                </div>
            </div>
            <div id="chat-active" style="display:none; flex:1; flex-direction:column;">
                <div id="chat-header">
                    <button id="chat-back-btn" title="" onclick="ChatApp.closeChatView()"><svg width="18" height="18" viewBox="0 0 32 32"><polyline points="20,6 10,16 20,26" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                    <span id="chat-title"></span>
                    <span id="chat-type"></span>
                    <button id="call-btn" title="" onclick="ChatApp.initiateCall()"><svg width="20" height="20" viewBox="0 0 32 32"><path d="M7 5c-2 2-2 8 0 14s8 12 14 14c2-2 4-5 4-7l-5-5-2 2c-3-2-7-6-7-10l2-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></button>
                </div>
                <!-- 通话状态栏 -->
                <div id="call-status-bar" style="display:none; align-items:center; justify-content:space-between; padding:8px 16px; background:#e8f5e9; border-bottom:1px solid #c8e6c9;">
                    <span id="call-status-text" style="font-size:13px; color:#2e7d32;">
                        <span class="zh">通话中</span> 
                    </span>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <span id="call-status-timer" style="font-size:14px; font-weight:500; color:#1b5e20;"></span>
                        <button id="call-status-hangup" title="" onclick="ChatApp.hangupCall()" style="background:#ff4b4b; color:#fff; border:none; border-radius:50%; width:36px; height:36px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;"><svg width="18" height="18" viewBox="0 0 32 32"><path d="M7 5c-2 2-2 8 0 14s8 12 14 14c2-2 4-5 4-7l-5-5-2 2c-3-2-7-6-7-10l2-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></button>
                    </div>
                </div>
                <div id="message-list"></div>
                <div id="input-area">
                    <div class="input-tools">
                        <button id="voice-btn" title="" onclick="ChatApp.startRecording()"><svg width="20" height="20" viewBox="0 0 32 32"><rect x="12" y="4" width="8" height="16" rx="4" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16" y1="22" x2="16" y2="28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="8" y1="28" x2="24" y2="28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M9 19a10 14 0 0 0 14 0" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/></svg></button>
                        <button title="" onclick="document.getElementById('image-upload').click()"><svg width="20" height="20" viewBox="0 0 32 32"><rect x="3" y="5" width="26" height="22" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="10" cy="12" r="3" fill="currentColor" opacity="0.5"/><polygon points="3,27 11,18 17,24 22,18 29,25 29,27" fill="currentColor" opacity="0.15"/></svg></button>
                        <button title="" onclick="document.getElementById('file-upload').click()"><svg width="20" height="20" viewBox="0 0 32 32"><path d="M10 28V14a6 6 0 0 1 12 0v12a3 3 0 0 1-6 0V12a1.5 1.5 0 0 1 3 0v12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                    </div>
                    <textarea id="message-input" placeholder="" rows="1"></textarea>
                    <div id="clipboard-preview" style="display:none;padding:4px 12px;border-top:1px solid var(--border);"></div>
                    <button id="send-btn" onclick="ChatApp.sendMessage()">
                        <span class="zh">发送</span> 
                    </button>
                    <input type="file" id="image-upload" accept="image/*" multiple style="display:none" onchange="ChatApp.sendImage(event)">
                    <input type="file" id="file-upload" multiple style="display:none" onchange="ChatApp.sendFile(event)">
                </div>
            </div>
        </div>
    </div>

    <!-- 语音通话 -->
    <div id="call-modal" class="modal" style="display:none;">
        <div class="call-modal-content">
            <div class="call-avatar"><svg width="36" height="36" viewBox="0 0 32 32"><circle cx="16" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="2"/><path d="M6 30c0-6 4-10 10-10s10 4 10 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
            <div id="call-name" class="call-contact-name"></div>
            <div id="call-status" class="call-status"></div>
            <div id="call-timer" class="call-timer"></div>
            <div class="call-actions" id="call-actions">
                <button id="call-reject-btn" class="call-btn reject" onclick="ChatApp.rejectCall()" title="" ><svg width="28" height="28" viewBox="0 0 32 32"><path d="M7 5c-2 2-2 8 0 14s8 12 14 14c2-2 4-5 4-7l-5-5-2 2c-3-2-7-6-7-10l2-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></button>
                <button id="call-answer-btn" class="call-btn answer" onclick="ChatApp.answerCall()" title=""><svg width="28" height="28" viewBox="0 0 32 32"><path d="M7 5c-2 2-2 8 0 14s8 12 14 14c2-2 4-5 4-7l-5-5-2 2c-3-2-7-6-7-10l2-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></button>
            </div>
            <button id="call-hangup-btn" class="call-btn hangup" onclick="ChatApp.hangupCall()" title="" style="display:none;"><svg width="32" height="32" viewBox="0 0 32 32"><path d="M7 5c-2 2-2 8 0 14s8 12 14 14c2-2 4-5 4-7l-5-5-2 2c-3-2-7-6-7-10l2-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg></button>
        </div>
    </div>

    <!-- 创建群组 -->
    <div id="create-room-modal" class="modal">
        <div class="modal-content create-group-modal">
            <h3>
                <span class="zh">创建群组</span> 
            </h3>
            <input type="text" id="room-name-input" placeholder="">
            <div id="room-member-select">
                <p>
                    <span class="zh">选择成员：</span> 
                </p>
                <div id="member-checklist"></div>
            </div>
            <div class="modal-actions">
                <button class="cancel-btn" onclick="ChatApp.closeModals()">
                    <span class="zh">取消</span> 
                </button>
                <button class="accept-btn" onclick="ChatApp.createGroup()">
                    <span class="zh">创建</span> 
                </button>
            </div>
        </div>
    </div>

    <!-- 消息提示弹窗 -->
    <div id="alert-modal" class="modal">
        <div class="modal-content alert-content">
            <p id="alert-text"></p>
            <div class="modal-actions">
                <button class="accept-btn" onclick="ChatApp._closeAlert()">
                    <span class="zh">确定</span> 
                </button>
            </div>
        </div>
    </div>


    <!-- 二维码弹窗 -->
    <div id="qr-modal" class="modal" onclick="ChatApp.closeQRModal()">
        <div class="modal-content qr-content" onclick="event.stopPropagation()">
            <h3 style="text-align:center;margin:0 0 12px 0;">
                <span class="zh">我的 ID 二维码</span>
            </h3>
            <div id="qr-canvas" style="text-align:center;padding:16px;background-color:#fff;"></div>
            <div class="modal-actions">
                <button class="accept-btn" onclick="ChatApp.closeQRModal()">
                    <span class="zh">关闭</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 扫码弹窗 -->
    <div id="scan-modal" class="modal" onclick="ChatApp.closeScanModal()">
        <div class="modal-content qr-content" onclick="event.stopPropagation()">
            <h3 style="text-align:center;margin:0 0 12px 0;">
                <span class="zh">扫描二维码</span>
            </h3>
            <video id="scan-video" autoplay playsinline style="width:100%;max-width:300px;display:block;margin:0 auto;border-radius:8px;"></video>
            <canvas id="scan-canvas" hidden></canvas>
            <p id="scan-status" style="text-align:center;margin-top:8px;color:#888;font-size:12px;"></p>
            <div class="modal-actions">
                <button class="accept-btn" onclick="ChatApp.closeScanModal()">
                    <span class="zh">关闭</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div id="delete-confirm-modal" class="modal">
        <div class="modal-content" style="min-width:300px;">
            <h3 id="delete-confirm-title"></h3>
            <p id="delete-confirm-desc" style="margin-bottom:12px; font-size:14px; color:#666;"></p>
            <input type="password" id="delete-confirm-password" placeholder="输入密码确认" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; font-size:14px; margin-bottom:12px; box-sizing:border-box;" />
            <div class="modal-actions">
                <button id="delete-confirm-cancel" class="btn-secondary">取消</button>
                <button id="delete-confirm-ok" class="btn-primary" style="background:#d32f2f;">删除</button>
            </div>
        </div>
    </div>

    <!-- 图片查看器 -->
    <div id="image-viewer" onclick="ChatApp.closeImageViewer(event)">
        <div id="image-viewer-toolbar">
            <button onclick="ChatApp.zoomOut(event)" title="缩小"><svg width="20" height="20" viewBox="0 0 32 32"><circle cx="16" cy="16" r="13" fill="none" stroke="currentColor" stroke-width="2"/><line x1="9" y1="16" x2="23" y2="16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg></button>
            <button onclick="ChatApp.zoomIn(event)" title="放大"><svg width="20" height="20" viewBox="0 0 32 32"><circle cx="16" cy="16" r="13" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16" y1="9" x2="16" y2="23" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="9" y1="16" x2="23" y2="16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg></button>
            <button onclick="ChatApp.rotateImage(event)" title="↺">↻</button>
            <button onclick="ChatApp.downloadImage(event)" title="下载"><svg width="20" height="20" viewBox="0 0 32 32"><line x1="16" y1="4" x2="16" y2="19" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><polyline points="10,13 16,21 22,13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="6" y1="27" x2="26" y2="27" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg></button>
            <button onclick="ChatApp.closeImageViewer()" title="关闭" style="margin-left:auto;"><svg width="20" height="20" viewBox="0 0 32 32"><circle cx="16" cy="16" r="13" fill="none" stroke="currentColor" stroke-width="2"/><line x1="10" y1="10" x2="22" y2="22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="22" y1="10" x2="10" y2="22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg></button>
        </div>
        <div id="image-viewer-container">
            <img id="image-viewer-img" src="" alt="">
            <img id="image-viewer-img2" src="" alt="" style="position:absolute;top:50%;left:50%;margin-inline:0;margin-block:0;max-width:95vw;max-height:80vh;object-fit:contain;pointer-events:none;z-index:-1;transform:translate(-50%,-50%);transform-origin:center center;">
            <div id="zoom-percent" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.6);color:#fff;font-size:24px;font-weight:bold;padding:12px 24px;border-radius:8px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:2001;">100%</div>
        </div>
    </div>
