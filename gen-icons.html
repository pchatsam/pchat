<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Generate Icons</title></head>
<body style="background:#0f0f1a;color:#eee;font-family:monospace;padding:40px;text-align:center">
<h2>PChat Icon Generator</h2>
<p style="color:#888">Click to generate PNG icons from logo.svg</p>
<div id="out"></div>
<script>
(async () => {
  const out = document.getElementById('out');
  const svgText = await fetch('./logo.svg').then(r => r.text());
  const sizes = [48, 72, 96, 144, 168, 192, 512];
  for (const s of sizes) {
    const canvas = document.createElement('canvas');
    canvas.width = s; canvas.height = s;
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = 'data:image/svg+xml,' + encodeURIComponent(svgText);
    await new Promise(r => { img.onload = r; });
    ctx.drawImage(img, 0, 0, s, s);
    const a = document.createElement('a');
    a.download = s === 192 ? 'icon-192.png' : s === 512 ? 'icon-512.png' : `icon-${s}.png`;
    a.href = canvas.toDataURL('image/png');
    a.textContent = `Download ${a.download}`;
    out.appendChild(a);
    out.appendChild(document.createElement('br'));
  }
  out.insertAdjacentHTML('afterbegin','<p style="color:#4ecca3">✅ Generated! Save to /pchat/</p>');
})();
</script>
</body></html>
